<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Robi Adventure</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/msg/de.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/NeilFraser/JS-Interpreter@master/acorn_interpreter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="shop-design.css">

    <style>
        :root {
            --bg: #0f172a;
            --primary: #38bdf8;
            --success: #22c55e;
            --locked: #334155;
            --text: #f8fafc;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: var(--text);
            overflow: hidden; height: 100vh; width: 100vw;
        }

        /* --- VIEW MANAGEMENT --- */
        .view { display: none; height: 100vh; width: 100vw; }
        .view.active { display: flex; }

        /* --- LEVEL SELECTION VIEW --- */
        #level-selection-view {
            flex-direction: column; align-items: center; overflow-y: auto; padding: 40px;
        }
        .path-container { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; width: 100%; max-width: 500px; padding-bottom: 100px; }
        .level-row { display: flex; justify-content: space-between; position: relative; padding: 10px 20px; width: 100%; box-sizing: border-box; }
        .level-row:nth-child(even) { flex-direction: row-reverse; }
        
        .level-btn { 
            width: 60px; height: 60px; border-radius: 50%; border: 4px solid var(--locked);
            background: #1e293b; color: #475569; font-weight: bold; cursor: not-allowed;
            display: flex; align-items: center; justify-content: center; z-index: 2;
            transition: all 0.3s;
            flex-shrink: 0; 
            box-sizing: border-box; 
            padding: 0;
        }
        .level-btn.active { border-color: var(--primary); color: var(--primary); cursor: pointer; transform: scale(1.1); box-shadow: 0 0 20px rgba(56,189,248,0.4); }
        .level-btn.completed { background: var(--success); border-color: var(--success); color: white; cursor: pointer; }

        /* --- PROGRAMMING VIEW --- */
        #score-count {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        #programming-view { flex-direction: row; }
        .left { width: 40%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 2px solid #334155; position: relative;}
        .right { width: 60%; display: flex; flex-direction: column; background: #fff; }
        
        #grid { display: grid; grid-template-columns: repeat(8, 50px); grid-template-rows: repeat(8, 50px); gap: 1px; background: #475569; position: relative; border: 2px solid #475569;}
        .cell { width: 50px; height: 50px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        #robot { position: absolute; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: all 0.3s; z-index: 10; pointer-events: none;}
        
        #blocklyArea { flex: 1; position: relative; width: 100%; }
        #blocklyDiv { position: absolute; top: 0; left: 0; bottom: 0; right: 0; }

        .controls-top { padding: 10px; background: #e2e8f0; display: flex; gap: 10px; border-bottom: 1px solid #cbd5e1; }
        
        /* Container für die Buttons über und unter dem Grid */
        .controls-game-top, .controls-game-bottom {
            display: flex;
            justify-content: center; /* Zentriert die Buttons horizontal */
            gap: 15px;               /* Abstand zwischen den Buttons */
            width: 100%;
        }

        .controls-game-top {
            margin-bottom: 10px;    /* Abstand zum Level-Titel/Grid */
        }

        .controls-game-bottom {
            margin-top: 20px;       /* Abstand vom Grid nach unten */
        }

        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-green { background: var(--success); color: white; width: 120px; }
        .btn-red { background: #ef4444; color: white; width: 120px; }
        .btn-gray { background: #64748b; color: white; width: 120px; }
        .btn-blue { background: var(--primary); color: #0f172a; width: 120px; }
        .btn-prev-next { background: #64748b; color: white;width: 61px;}
        /* Stil für gesperrte Buttons */
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* --- OVERLAYS --- */
        #tutorial-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; display: none; justify-content: center; align-items: center; }
        .tutorial-bubble { background: white; color: #1e293b; padding: 20px; border-radius: 12px; max-width: 300px; position: absolute; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .overlay-msg { position: absolute; top: 40%; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 8px; display: none; z-index: 2000; font-weight: bold; color: white; text-align: center; min-width: 200px;}

        /* --- MÜNZEN FÜR MÜNZANZEIGE --- */
        .flying-coin {
            position: fixed;
            z-index: 9999;
            font-size: 24px;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Schöner Bogen-Effekt */
            transform: scale(0);
        }

        @keyframes coin-spin {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.3) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        /* --- MÜNZEN FÜR QUIZ-LEVELS --- */
        @keyframes floatUpCentered {
            0% { 
                transform: translate(-50%, -50%) translateY(0); /* Start: Exakt Mitte */
                opacity: 1; 
            }
            100% { 
                transform: translate(-50%, -50%) translateY(-150px); /* Ziel: 150px weiter oben */
                opacity: 0; 
            }
        }

        .floating-points-centered {
            position: fixed;
            /* Exakt mittig auf dem Bildschirm positionieren */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* WICHTIG: Gleicht die eigene Breite/Höhe aus */

            /* Styling für die Münzen */
            color: #eab308; /* Goldgelb */
            font-weight: bold;
            font-size: 48px; /* Schön groß in der Mitte */
            text-shadow: 0 4px 10px rgba(0,0,0,0.3); /* Etwas Schatten für bessere Lesbarkeit */

            /* Die neue Animation anwenden */
            animation: floatUpCentered 1.8s ease-out forwards;

            /* Verhindert, dass man versehentlich darauf klickt */
            pointer-events: none;
            z-index: 10000; /* Ganz oben, über allem anderen */
        }

        /* --- Shop-Button --- */
        .shop-open-btn {
            background: #f59e0b; /* Gold-Gelb */
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .shop-open-btn:hover {
            background: #d97706;
            transform: scale(1.05);
        }

        .score-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fbbf24;
        }

        /* --- Spur-Effekte --- */
        .rainbow-trail-particle {
            position: absolute;
            width: 8px;            /* Etwas kleiner für dichte Linien */
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            transition: transform 2.0s ease-out, opacity 0.5s ease-out;
            
            /* Optional: Ein leichter Leucht-Effekt (Glow) */
            box-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
        }

        .trail-bubble {
            position: absolute;
            pointer-events: none;
            z-index: 12;
            transition: transform 1.5s ease-out, opacity 1.2s ease-out;
            opacity: 0.8;
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5));
        }

        .trail-stardust-particle {
            position: absolute;
            pointer-events: none;
            z-index: 11;
            border-radius: 50%; /* Runde Punkte wirken wie Staub */
            transition: transform 1s ease-out, opacity 0.8s ease-in;
            
            /* Der entscheidende Leuchteffekt */
            box-shadow: 0 0 10px 2px rgba(255, 215, 0, 0.8);
            
            /* Optional: Ein Funkeln hinzufügen */
            animation: sparkle 0.5s infinite alternate;
        }

        @keyframes sparkle {
            from { filter: brightness(1); transform: scale(1); }
            to { filter: brightness(1.5); transform: scale(1.2); }
        }

        .trail-matrix-particle {
            position: absolute;
            pointer-events: none;
            z-index: 11;
            color: #00ff41; /* Klassisches Matrix-Grün */
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-shadow: 0 0 8px #00ff41; /* Der digitale Glow */
            transition: transform 0.7s ease-in, opacity 0.7s ease-out;
            opacity: 1;
        }

        /* Optional: Ein leichtes Flackern für den alten Monitor-Look */
        @keyframes matrix-flicker {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .trail-matrix-particle {
            animation: matrix-flicker 0.2s infinite;
        }

        .trail-footprint {
            position: absolute;
            width: 10px;
            height: 16px;
            background-color: #92806d;
            border-radius: 20% 20% 80% 80%;
            z-index: 10;
            pointer-events: none;
            transition: opacity 1.5s ease;
            transform-origin: center center;
            display: block;
        }

        .trail-footprint::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 1px;
            width: 6px;
            height: 6px;
            background-color: inherit;
            border-radius: 50%;
        }
   </style>
</head>
<body>

    <div id="level-selection-view" class="view active">
        <div style="margin-top: 20px; text-align: center; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
            <button onclick="exportSavegame()" class="btn-blue" style="font-size: 12px; width: auto;">
                💾 Spielstand speichern
            </button>

            <button onclick="document.getElementById('import-input').click()" class="btn-gray" style="font-size: 12px; width: auto;">
                📂 Spielstand laden
            </button>
            <input type="file" id="import-input" style="display: none;" accept=".json" onchange="importSavegame(event)">
            
            <button onclick="resetFullGame()" style="background-color: #ef4444; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; opacity: 0.8;">
                🗑️ Spielstand zurücksetzen
            </button>

            <div class="menu-header" style="display: flex; justify-content: space-between; width: 100%; max-width: 400px; align-items: center;">
                <div class="score-display">🪙 <span id="main-score">0</span></div>
                <button class="shop-open-btn" onclick="openShop()">🛒 Shop</button>
            </div>
            
        </div>
        <h1>Robi Adventure</h1>
        <p style="color: #94a3b8">Wähle eine Herausforderung</p>
        <div id="path-container" class="path-container"></div>
    </div>

    <div id="programming-view" class="view">
        <div id="success" class="overlay-msg" style="background: var(--success);">Level bestanden! 🏝️</div>
        <div id="warning" class="overlay-msg" style="background: #f59e0b;">Achtung! Ein Hai! 🦈</div>

        <div class="left">
            <div id="score-display" style="position: absolute; top: 15px; right: 20px; background: rgba(15, 23, 42, 0.8); padding: 10px 20px; border-radius: 20px; border: 2px solid var(--primary); z-index: 1000; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 24px;">🪙</span>
                <span id="score-count" style="font-size: 20px; font-weight: bold; color: var(--primary);">0</span>
            </div>

            <h2 id="level-title" style="color: var(--primary); margin: 0 0 10px 0;">Level 1</h2>

            <div class="controls-game-top">
                <button class="btn-green" onclick="runCode()">▶ START</button>
                <button class="btn-red" onclick="reset()">↺ RESET</button>
            </div>

            <div id="grid">
                <div id="robot">
                    <img id="player" src="images/robi_right.png">
                </div>
            </div>

            <div class="controls-game-bottom">
                <button id="btn-prev" class="btn-prev-next" onclick="changeLevel(-1)">◀◀</button>
                <button class="btn-gray" onclick="showView('level-selection-view')">🏠 Menü</button>
                <button class="btn-blue" onclick="chooseTutorialForHelpButton()">❓ Hilfe</button>
                <button id="btn-next" class="btn-prev-next" onclick="changeLevel(1)">▶▶</button>
            </div>
        </div>

        <div class="right">
            <div class="controls-top">
                <button class="btn-gray" onclick="saveBlocks()">💾 Speichern</button>
                <button class="btn-gray" onclick="loadBlocks()">📂 Laden</button>
                <input type="file" id="file-input" style="display: none;" accept=".xml">
            </div>
            <div id="blocklyArea">
                <div id="blocklyDiv"></div>
            </div>
        </div>
    </div>

    <div id="tutorial-overlay">
        <div id="tutorial-bubble" class="tutorial-bubble">
            <h3 id="tut-title"></h3>
            <p id="tut-text"></p>
            <button class="btn-blue" style="float: right;" onclick="nextStep()">Weiter</button>
        </div>
    </div>

    <div id="quiz-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(5px);">
        <div id="quiz-card" style="background:white; padding:30px; border-radius:20px; max-width:550px; width:90%; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); position:relative;">
            <div id="quiz-content"></div>
        </div>
    </div>

    <div id="shop-overlay" class="shop-overlay">
        <div class="shop-content">
            <header class="shop-header">
                <h2>Robo-Shop 🛒</h2>
                <div class="shop-score">Münzen: <span id="shop-coin-count">0</span> 🪙</div>
                <button class="close-shop" onclick="closeShop()">✖ Schließen</button>
            </header>

            <nav class="shop-nav">
                <button class="shop-cat-btn active" onclick="filterShop('skins', this)">Skins</button>
                <button class="shop-cat-btn" onclick="filterShop('spuren', this)">Spuren</button>
                <button class="shop-cat-btn" onclick="filterShop('welten', this)">Welten</button>
                <button class="shop-cat-btn" onclick="filterShop('upgrades', this)">Upgrades</button>
            </nav>

            <div id="shop-grid" class="shop-grid"></div>
        </div>
    </div>

    // --- LEVEL SELECTION ---
    function renderLevelPath() {
        const container = document.getElementById('path-container');
        container.innerHTML = '';
        const rowLayout = [6, 6, 6, 11, 11, 11]; 
        let levelPointer = 0; // Wir nutzen einen Pointer für das Array statt nur eine Nummer

        rowLayout.forEach((perRow) => {
            const row = document.createElement('div');
            row.className = 'level-row';
            
            for (let c = 0; c < perRow; c++) {
                const levelDef = gameData.levels[levelPointer];
                if (!levelDef) break;

                // Wenn es ein Practice-Level ist, überspringen wir es für die normale Zählung
                if (levelDef.type === 'practice') {
                    levelPointer++;
                    c--; // Platz in der Reihe nicht verbrauchen
                    continue;
                }

                // Normalen Button erstellen
                const btn = createLevelButton(levelDef);
                row.appendChild(btn);

                // BESONDERHEIT: Wenn dieses Level ein Quiz ist, prüfen wir, 
                // ob das danach folgende Practice-Level daneben angezeigt werden soll
                const nextDef = gameData.levels[levelPointer + 1];
                if (levelDef.type === 'quiz' && nextDef && nextDef.type === 'practice') {
                    const pBtn = createPracticeButton(nextDef);
                    row.appendChild(pBtn);
                    // Wir fügen einen kleinen Spacer/Abstand hinzu (per CSS)
                    if (nextDef.id === 'P1' || nextDef.id === 'P3' || nextDef.id === 'P5') {
                        pBtn.style.marginLeft = "25px"; 
                    }
                    else {
                        pBtn.style.marginRight = "25px";
                    }
                }

                levelPointer++;
            }
            container.prepend(row);
        });
    }

    function createLevelButton(levelDef) {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        btn.innerHTML = levelDef.type === 'quiz' ? '❓' : levelDef.id;

        if (levelDef.id < gameData.unlockedLevel) btn.classList.add('completed');
        else if (levelDef.id === gameData.unlockedLevel) btn.classList.add('active');

        btn.onclick = () => {
            if (levelDef.id <= gameData.unlockedLevel) {
                levelDef.type === 'quiz' ? startQuiz(levelDef) : startLevel(levelDef.id);
            }
        };
        return btn;
    }

    function createPracticeButton(levelDef) {
        const btn = document.createElement('button');
        btn.className = 'level-btn practice-btn';
        btn.innerHTML = '⚡';

        // Wir prüfen explizit im Array der freigeschalteten Übungen
        const isUnlocked = gameData.unlockedPractices && gameData.unlockedPractices.includes(levelDef.id);
        
        if (isUnlocked) {
            btn.classList.add('active'); // Oder eine eigene Klasse
            console.log("Starte Übungslevel:", levelDef.id);
            btn.onclick = () => startPractice(levelDef);
        } else {
            btn.style.opacity = "0.3";
            btn.style.cursor = "not-allowed";
            btn.onclick = () => alert("Löse erst das Quiz, um diese Übung freizuschalten!");
        }
        return btn;
    }

    function startLevel(num) {
   		gameData.currentLevelNum = parseInt(num);

        // Check wegen Sonderlevels (quiz & practice)

            return;

        // Wenn es ein Quiz oder Practice ist, brechen wir hier ab,

        if (config.type === 'quiz' || config.type === 'practice') {
            console.log("Spezial-Level erkannt. Nutze die spezifische Start-Logik.");
            return;
        }

        // Tiefe Kopie erstellen, damit wir 'treasure' löschen können, ohne das Original zu zerstören
        currentLevelConfig = JSON.parse(JSON.stringify(config));

   		document.getElementById('level-title').innerText = "Level " + gameData.currentLevelNum;

        setTimeout(() => {
            updateNavigationButtons();
        }, 50);
        
        // Überprüfen, ob Tutorial existiert & dieses ggf. anzeigen
        setTimeout(() => {
            chooseTutorialForStorage();
        }, 500);

        updateNavigationButtons();
    }

    function chooseTutorialForStorage() {
        const level = gameData.levels.find(l => l.id === gameData.currentLevelNum);
        if (!level || !level.tutorials) return;

        // Wir sammeln alle Tutorials, die noch nicht gesehen wurden
        const unseenTutorials = level.tutorials.filter(tutKey => {
            return !localStorage.getItem(`tut_completed_${tutKey}`);
        });  
        // Nur wenn es ungesehene Tutorials gibt, starten wir sie gesammelt
        if (unseenTutorials.length > 0) {
            startTutorial(unseenTutorials);

            // Alle als erledigt markieren
            unseenTutorials.forEach(tutKey => {
                localStorage.setItem(`tut_completed_${tutKey}`, 'true');
            });
        }
    }

    function chooseTutorialForHelpButton() {
        const level = gameData.levels.find(l => l.id === gameData.currentLevelNum);
        if (!level || !level.tutorials || level.tutorials.length === 0) {
            alert("In diesem Level gibt es keine speziellen Tipps. Du schaffst das!");
            return;
        }

        // Wenn es mehrere Tutorials gibt, zeigen wir das wichtigste (das letzte in der Liste) 
        // oder wir starten einfach das erste erneut.
        startTutorial(level.tutorials);
    }

            let timesCompleted = gameData.completedLevels[gameData.currentLevelNum] || 0;
            let treasurePoints = 0;

            if (timesCompleted === 0) {
                treasurePoints = 2; // Erstes Mal: Volle Beute
            } else if (timesCompleted === 1) {
                treasurePoints = 1; // Zweites Mal: Kleiner Bonus
            } else {
                treasurePoints = 0; // Ab dem dritten Mal: Nur noch Ehre, kein Gold
            }

            // Punkte nur addieren und anzeigen, wenn es welche gibt
            if (treasurePoints > 0) {
                gameData.score += treasurePoints;
                localStorage.setItem('robo_score', gameData.score);
                
                spawnCoins(treasurePoints); // Münz-Animation
                updateScoreDisplay();       // Anzeige oben rechts
            } else {
                // Optional: Ein kleiner Text-Hinweis, dass es keine Punkte mehr gibt
                console.log("Level bereits oft gelöst, keine Schatzpunkte mehr.");
            }
            
        } else {
            // --- FEHLER: Hier liegt kein Schatz! ---
            
            // Wir nutzen dein vorhandenes Warn-Overlay
            const warningBox = document.getElementById('warning');
            
            // Wir ändern kurz den Text der Box
            warningBox.innerText = "Hier ist kein Schatz! ❌💎";
            warningBox.style.display = 'block';
            
            // Nach 2 Sekunden blenden wir die Nachricht wieder aus
            setTimeout(() => {
                warningBox.style.display = 'none';
                // Optional: Text wieder auf den Standard zurücksetzen
                warningBox.innerText = "Achtung! Ein Hai! 🦈";
            }, 2000);
        }
    }
    
    // Funktionen für die Sensoren
    function sharkFront() {
        const config = currentLevelConfig;
        if (!config) return false;

        // 1. Richtung normalisieren (0, 90, 180, 270)
        let d = (robo.dir % 360 + 360) % 360;
        let nx = robo.x, ny = robo.y;

        // 2. Zielkoordinate bestimmen
        if (d === 0) nx++;      // rechts
        else if (d === 90) ny++; // unten
        else if (d === 180) nx--; // links
        else if (d === 270) ny--; // oben

        // 3. Rand-Check (Damit er nicht vom Feld fällt)
        if (nx < 0 || nx > 7 || ny < 0 || ny > 7) return false;

        // 4. Hai-Check
        const hasShark = config.sharks && config.sharks.some(s => s.x === nx && s.y === ny);
        
        // Gibt true zurück, wenn ein Hai auf dem Feld vor Robi ist.
        return hasShark;
    }

    function sharkLeft() {

        // 1. Richtung normalisieren (0, 90, 180, 270)
        let d = (robo.dir % 360 + 360) % 360;
        let nx = robo.x, ny = robo.y;

        // 2. Richtung für "Links" bestimmen
        let leftDir = (d - 90 + 360) % 360;

        // 3. Zielkoordinate bestimmen
        if (leftDir === 0) nx++;      // rechts
        else if (leftDir === 90) ny++; // unten
        else if (leftDir === 180) nx--; // links
        else if (leftDir === 270) ny--; // oben

        // 4. Rand-Check (Damit er nicht vom Feld fällt)
        if (nx < 0 || nx > 7 || ny < 0 || ny > 7) return false;

        // 5. Hai-Check
        const hasShark = config.sharks && config.sharks.some(s => s.x === nx && s.y === ny);
        
        // Gibt true zurück, wenn ein Hai auf dem Feld links von Robi ist.
        return hasShark;
    }

        else if (rightDir === 180) nx--; // links

    function updateToolbox(blockTypes) {
        const contents = blockTypes.map(t => {

                }
            }
            if (t === 'controls_if_else') {

                };

                    "inputs": {
                        "TIMES": {
                            "shadow": { "type": "math_number", "fields": { "NUM": 3 } }

                    }
                };
            }
            if (t === 'controls_whileUntil') {
            return {

                }
            };

            return { "kind": "block", "type": t };
        });

    // --- GAME LOGIK ---
    function initGrid(config) {
    	const grid = document.getElementById('grid');
   		if (!grid) return;

        grid.querySelectorAll('.cell').forEach(c => c.remove());
    
        // Sicherstellen, dass config existiert
        if (!config || !config.island) {
            console.error("initGrid wurde ohne gültige Insel-Daten aufgerufen!");
            return;
        }
        
        for (let i = 0; i < 64; i++) {
                const x = i % 8; const y = Math.floor(i / 8);
                const cell = document.createElement('div');
                cell.className = 'cell';
    
            // Insel platzieren
            if (x === config.island.x && y === config.island.y) {
                cell.innerText = '🏝️';
            } 

            // 2. Schatz
            else if (config.treasure && x === config.treasure.x && y === config.treasure.y) {
                const img = document.createElement('img');
                img.src = 'images/treasure.png';
                img.style.width = '40px';  
                img.style.height = '40px';
                cell.appendChild(img);
            }
    
            // 3. Haie
            if (config.sharks) {
                const hasShark = config.sharks.some(s => s.x === x && s.y === y);
                if (hasShark) cell.innerText = '🦈';
            }
    
            grid.appendChild(cell);
        }
    }

    function reset() {
        // 0. Sicherstellen, dass bei Reset Endlosschleifen abgebrochen werden
        isRunning = false; // Signalisiert dem Code-Abarbeiter: Hör auf!

        // Alle laufenden Timeouts löschen, damit keine verzögerten 
        // Bewegungen aus der "alten" Ausführung mehr passieren.
        if (runnerTimeout) {
            clearTimeout(runnerTimeout);
        }

        // 1. FALLUNTERSCHEIDUNG: Übung oder normales Level?
        const currentId = gameData.currentLevelNum;
        const isPractice = typeof currentId === 'string' && currentId.startsWith('P');

        if (!isPractice) {
            // NUR bei normalen Leveln stellen wir die Konfiguration aus dem Bauplan wieder her
            const originalConfig = gameData.levels.find(l => l.id === currentId) || gameData.levels[0];
            currentLevelConfig = JSON.parse(JSON.stringify(originalConfig));
        } else {
            // Bei Practice-Leveln (P1, P2...) behalten wir die aktuelle currentLevelConfig,
            // da dort unsere Zufallswerte (start, island) drinstehen!
            console.log("Übungsmodus: Zufallskarte bleibt erhalten.");
        }

        // 2. Roboter auf Start zurücksetzen
        // Wir nehmen die startPos direkt aus der currentLevelConfig (die entweder geladen oder gewürfelt wurde)
        totalSteps = 0;
        const startPos = currentLevelConfig.start || { x: 0, y: 7 };
        robo = { x: startPos.x, y: startPos.y, dir: 270 };   

        // 3. Das Grid neu zeichnen
        // Wichtig: Wir übergeben die aktuelle Config (bei Practice sind das die Zufallswerte)
        initGrid(currentLevelConfig);
        updateUI();

        // 4. Meldungen verstecken
        document.getElementById('success').style.display = 'none';
        document.getElementById('warning').style.display = 'none';

        // 5. Die gelbe Markierung von den Blöcken entfernen
        if(workspace) {

        }

    function updateUI() {
        const r = document.getElementById('robot');
        r.style.left = (robo.x * 51) + 'px';

        r.style.transform = `rotate(${robo.dir}deg)`;
    }

    // Die eigentliche Bewegungs-Logik (ausgelagert aus runCode)
    function moveForwardAction() {
        const config = currentLevelConfig;

        // Position für Spur-Effekt speichern
        const oldX = robo.x;
        const oldY = robo.y;

        let d = (robo.dir % 360 + 360) % 360;
        let nx = robo.x, ny = robo.y;
        if (d === 0) nx++; else if (d === 90) ny++; else if (d === 180) nx--; else if (d === 270) ny--;
        
        const hitShark = config.sharks && config.sharks.some(s => s.x === nx && s.y === ny);
        if (hitShark) {
            document.getElementById('warning').style.display = 'block';
            myInterpreter = null; // Stoppt den Interpreter bei Fehler
            return;
        }

        // Nach der Bewegung SPur hinterlassen
        if (nx !== oldX || ny !== oldY) { // Nur wenn er sich wirklich bewegt hat
            startSmoothTrail(300);
        }
        
        robo.x = Math.max(0, Math.min(7, nx));
        robo.y = Math.max(0, Math.min(7, ny));
        updateUI();
    }

    function runCode() {
        reset();

        isRunning = true; 
        totalSteps = 0;
        
        // Code generieren mit dem neuen Generator-Objekt
        const code = javascript.javascriptGenerator.workspaceToCode(workspace);
        if (!code) return;

        const wrapper = function() {
            moveForwardAction(); // Deine eigentliche Spiellogik
            window.lastStepWasMovement = true; // Dem Interpreter sagen: "Bitte hier pausieren!"
        };
        
        if (!code) return; // Falls kein Code da ist, nichts tun

        try {
            myInterpreter = new Interpreter(code, (interpreter, scope) => {
                interpreter.setProperty(scope, 'moveForward', interpreter.createNativeFunction(wrapper));
                interpreter.setProperty(scope, 'turnLeft', interpreter.createNativeFunction(() => { robo.dir -= 90; updateUI(); }));
                interpreter.setProperty(scope, 'turnRight', interpreter.createNativeFunction(() => { robo.dir += 90; updateUI(); }));
                interpreter.setProperty(scope, 'collectTreasure', interpreter.createNativeFunction(() => { collectTreasure(); }));
                interpreter.setProperty(scope, 'sharkFront', interpreter.createNativeFunction(() => { return sharkFront(); }));
                interpreter.setProperty(scope, 'sharkLeft', interpreter.createNativeFunction(() => { return sharkLeft(); }));
                interpreter.setProperty(scope, 'sharkRight', interpreter.createNativeFunction(() => { return sharkRight(); }));
                interpreter.setProperty(scope, 'onIsland', interpreter.createNativeFunction(() => { return onIsland(); }));
                interpreter.setProperty(scope, 'onTreasure', interpreter.createNativeFunction(() => { return onTreasure(); }));
            });
            runStep();
        } catch (e) {
            console.error("Interpreter Fehler:", e);
            isRunning = false; // Bei Fehler stoppen
        }
    }

 

function runStep() {
    // 1. ABBRUCH-CHECK: Wurde Reset gedrückt?
    if (!myInterpreter || !isRunning) {
        console.log("Ausführung gestoppt.");
        return; 
    }

    window.lastStepWasMovement = false; 
    let hasMoreCode = true;
    
    // 2. SICHERHEIT GEGEN ENDLOSSCHLEIFEN
    // Wir zählen, wie viele Logik-Schritte der Interpreter macht, 
    // ohne dass Robi sich bewegt.
    let logicBreakCounter = 0; 

    while (hasMoreCode && !window.lastStepWasMovement) {
        hasMoreCode = myInterpreter.step();
        
        logicBreakCounter++;
        totalSteps++;

        // Wenn der Interpreter 2000 Logik-Schritte macht, ohne zu ziehen...
        if (logicBreakCounter > 2000 || totalSteps > MAX_STEPS) {
            isRunning = false;
            alert("Endlosschleife oder zu langes Programm erkannt! Robi bricht ab.");
            reset(); // Ruft deine Reset-Funktion auf
            return;
        }
    }

    if (hasMoreCode && isRunning) {
        // Animation abwarten, dann nächster Schritt
        runnerTimeout = setTimeout(runStep, gameSpeed); 
    } else if (!hasMoreCode) {
        isRunning = false;
        console.log("Programm beendet. Prüfe Siegbedingungen...");
        checkWin();
    }
}

        const nextLevelExists = gameData.levels.find(l => l.id === gameData.currentLevelNum + 1);

        btnNext.disabled = !(nextLevelExists && isUnlocked);
    }

    function startTutorial(setName) {
        if (!setName) return;

        let newSteps = [];

        // Fall A: setName ist ein Array
        if (Array.isArray(setName)) {
            setName.forEach(name => {
                if (tutData[name]) newSteps = newSteps.concat(tutData[name]);
            });
        } 
        // Fall B: setName ist ein einzelner String
        else if (tutData[setName]) {
            newSteps = tutData[setName];
        }

        if (newSteps.length === 0) return;

        // PRÜFUNG: Läuft gerade schon ein Tutorial?
        const overlay = document.getElementById('tutorial-overlay');
        if (overlay.style.display === 'flex' && currentTutSet) {
            // Falls ja: Hänge die neuen Schritte einfach hinten an das bestehende Set an!
            currentTutSet = currentTutSet.concat(newSteps);
            console.log("Tutorials wurden kombiniert. Neue Länge:", currentTutSet.length);
        } else {
            // Falls nein: Starte ganz normal von vorne
            currentTutSet = newSteps;
            tutStep = 0;
            overlay.style.display = 'flex';
            updateTutBubble();
        }
    }

    function nextStep() {
        tutStep++;
        if(tutStep < currentTutSet.length) {
            updateTutBubble();
        } else {
            document.getElementById('tutorial-overlay').style.display = 'none';
        } 
    }

    function updateTutBubble() {
        const d = currentTutSet[tutStep];
        document.getElementById('tut-title').innerText = d.t;
        document.getElementById('tut-text').innerText = d.m;
        const b = document.getElementById('tutorial-bubble');
        b.style.top = d.p.top; b.style.left = d.p.left;
    }

    // PROGRAMM SPEICHERN
    function saveBlocks() { 
        if (!workspace) return;

        // 1. Den Workspace in XML-Text umwandeln
        const xml = Blockly.Xml.workspaceToDom(workspace);
        const xmlText = Blockly.Xml.domToPrettyText(xml);

        // 2. Eine Datei (Blob) daraus erstellen
        const blob = new Blob([xmlText], {type: 'text/xml'});
        const a = document.createElement('a');
        
        // Dateiname generieren (z.B. Roby_Level_5.xml)
        const filename = "Roby_Level_" + gameData.currentLevelNum + ".xml";

        // 3. Den Download "vortäuschen"
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        
        // Aufräumen
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
    }

    // PROGRAMM ÖFFNEN
    function loadBlocks() {
        document.getElementById('file-input').click();
    }

    // Datei-Upload
    document.getElementById('file-input').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const xmlText = e.target.result;
            try {
                // Den Text in ein XML-Objekt umwandeln
                const xml = Blockly.utils.xml.textToDom(xmlText);
                
                // Den aktuellen Workspace leeren (optional, aber empfohlen)
                workspace.clear();
                
                // Die neuen Blöcke in den Workspace laden
                Blockly.Xml.domToWorkspace(xml, workspace);
                
            } catch (error) {
                console.error("Fehler beim Laden der XML:", error);
                alert("Hoppla! Diese Datei konnte nicht gelesen werden.");
            }
            
            // Input zurücksetzen, damit dieselbe Datei erneut gewählt werden kann
            event.target.value = '';
        };
        
        reader.readAsText(file);
    });

    // GESAMTEN SPIELSTAND (SCORE; TUTORIALS; ACTIVATEDLEVELS) SPEICHERN
    function exportSavegame() {
        // Alle wichtigen Daten in ein Objekt packen
        const saveData = {
            unlockedLevel: gameData.unlockedLevel,
            score: gameData.score,
            completedLevels: gameData.completedLevels,
            tutorials: {}
        };

        // Wir sammeln alle Tutorial-Fortschritte aus dem Speicher
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith('tut_completed_')) {
                saveData.tutorials[key] = localStorage.getItem(key);
            }
        }

        // Datum und Uhrzeit für Dateinamen ermitteln
        const jetzt = new Date();
        // Format: DD-MM-YYYY_HH-mm
        const zeitStempel = jetzt.toLocaleDateString() + "_" + jetzt.toLocaleTimeString().slice(0, 5);
        // Ersetzt Punkte und Doppelpunkte durch Bindestriche für die Dateisicherheit
        const dateiName = zeitStempel.replace(/[\:]/g, '-');

        // JSON-Datei erstellen und Download auslösen
        const dataStr = JSON.stringify(saveData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);

        const link = document.createElement('a');
        link.href = url;
        link.download = `RobisProgrammierAbenteuer_Stand_${dateiName}.json`;
        link.click();
        URL.revokeObjectURL(url);
    }

    // GESAMTEN SPIELSTAND LADEN
    function importSavegame(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);

                // 1. Daten in das laufende Spiel-Objekt schreiben
                gameData.unlockedLevel = importedData.unlockedLevel || 1;
                gameData.score = importedData.score || 0;
                gameData.completedLevels = importedData.completedLevels || {};

                // 2. Daten im LocalStorage des Browsers dauerhaft machen
                localStorage.setItem('unlocked_level', gameData.unlockedLevel);
                localStorage.setItem('robo_score', gameData.score);
                localStorage.setItem('completed_levels', JSON.stringify(gameData.completedLevels));

                // Tutorials wiederherstellen
                if (importedData.tutorials) {
                    for (const key in importedData.tutorials) {
                        localStorage.setItem(key, importedData.tutorials[key]);
                    }
                }

                // 3. Die Ansicht aktualisieren
                renderLevelPath();
                updateScoreDisplay();
                
            } catch (err) {
                alert("Hoppla! Diese Datei scheint kein gültiger Spielstand zu sein.");
                console.error(err);
            }
        };
        reader.readAsText(file);
        // Input zurücksetzen, damit dieselbe Datei nochmal gewählt werden könnte
        event.target.value = '';
    }

    // --- JUBEL LOGIK ---
    // Konfetti bei Lösen eines Levels
    function celebration() {
        // Konfetti von links und rechts schießen
        var duration = 3 * 1000; // 2 Sekunden lang
        var end = Date.now() + duration;

        (function frame() {
            // Konfetti von links
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#22c55e', '#3b82f6', '#facc15'] // Deine Markenfarben
            });
            // Konfetti von rechts
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#22c55e', '#3b82f6', '#facc15']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }

    // Münzen fliegen von Robi zur Münzanzeige
    function spawnCoins(amount) {
        const scoreDisplay = document.getElementById('score-display');
        const roboElement = document.getElementById('robot'); 
        
        if (!scoreDisplay || !roboElement) return;

        const endRect = scoreDisplay.getBoundingClientRect();
        const startRect = roboElement.getBoundingClientRect();

        // Die Schleife läuft jetzt 'amount' mal
        for (let i = 0; i < amount; i++) {
            setTimeout(() => {
                const coin = document.createElement('div');
                coin.className = 'flying-coin';
                coin.innerText = '🪙';
                
                coin.style.left = startRect.left + 'px';
                coin.style.top = startRect.top + 'px';
                coin.style.transform = 'scale(1)';
                
                document.body.appendChild(coin);

                void coin.offsetWidth; 

                coin.style.left = (endRect.left + 10) + 'px';
                coin.style.top = (endRect.top + 10) + 'px';
                coin.style.transform = 'scale(0.5)';
                coin.style.opacity = '0.7';

                setTimeout(() => {
                    coin.remove();
                }, 800);
            }, i * 150); 
        }
    }

    // Münzregen beim Heben eines Schatzes
    function coinRain() {
        var duration = 2 * 1000;
        var animationEnd = Date.now() + duration;

        (function frame() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return;

            confetti({
                particleCount: 2, // Wenige Partikel pro Frame für einen "Regen"-Effekt
                startVelocity: 0,
                gravity: 1.2,     // Etwas schwerer, damit es wie Metall wirkt
                ticks: 200,
                origin: {
                    x: Math.random(),
                    y: -0.1       // Startet leicht außerhalb des oberen Rands
                },
                // Verschiedene Gold- und Gelbtöne für den Glanz-Effekt
                colors: ['#FFD700', '#FDB931', '#E8AA14', '#B8860B'],
                shapes: ['square'], // Quadrate wirken wie fallende Goldplättchen
                scalar: 1.2         // Etwas größer als normales Konfetti
            });

            requestAnimationFrame(frame);
        }());
    }

    function checkQuizAnswers(quizId) {
        const quizDef = gameData.levels.find(l => l.id === quizId);
        let allCorrect = true;

        quizDef.questions.forEach((q, i) => {
            const selected = Array.from(document.querySelectorAll(`input[name="q${i}"]:checked`)).map(el => parseInt(el.value));
            if (JSON.stringify(selected.sort()) !== JSON.stringify(q.correct.sort())) {
                allCorrect = false;
            }
        });

        if (allCorrect) {
            alert("Super! Alles richtig. Nächste Stufe freigeschaltet!");
            gameData.unlockedLevel++;
            localStorage.setItem('unlocked_level', gameData.unlockedLevel);
            closeOverlay();
            renderLevelPath();
        } else {
            alert("Da war noch ein Fehler dabei. Schau nochmal genau hin!");
        }
    }

    function startPractice(practiceDef) {
        console.log("Generiere neues Zufallslevel für Übung:", practiceDef.id);
        // Generiere zufällige Koordinaten für Start und Insel
        const randomStart = { 
            x: Math.floor(Math.random()*8), 
            y: 7 };
        const randomIsland = { 
            x: Math.floor(Math.random()*8), 
            y: Math.floor(Math.random() * 5) + 3
        };
        
        // Sicherstellen, dass Start nicht auf Insel ist
        while(randomStart.x === randomIsland.x) randomStart.x = Math.floor(Math.random()*8);

        // Standardwerte für Zufallselemente späterer Level, damit es auch ohne diese funktioniert
        let generatedSharks = [];
        let generatedTreasure = null;

        // Hinzufügen weiterer Komponenten je nach Übungslevelkomplexität
        if (practiceDef.id === 'P2') {
            const sharkCount = Math.floor(Math.random() * 3) + 2; // 2-4 Haie
            // Wir übergeben Start und Insel, um den Bereich einzugrenzen
            generatedSharks = generateElementsBetween(sharkCount, randomStart, randomIsland, []);
        } 
        else if (practiceDef.id === 'P3' || practiceDef.id === 'P4' || practiceDef.id === 'P5') {
            generatedSharks = generateElementsBetween(5, randomStart, randomIsland, []);
            const treasures = {
                x: Math.floor(Math.random()*8), 
                y: Math.floor(Math.random() * 5) + 3
            };
            generatedTreasure = treasures;
        }

        currentLevelConfig = {
            id: practiceDef.id,
            type: 'practice',
            start: randomStart,
            island: randomIsland,
            sharks: generatedSharks,
            treasure: generatedTreasure,
            blocks: practiceDef.blocks || ['move_forward', 'turn_left', 'turn_right']
        };

        // 3. UI aktualisieren
        const title = document.getElementById('level-title');
        if (title) title.innerText = "Übung: Zufallslevel";
        
        gameData.currentLevelNum = practiceDef.id;

        // Spiel starten wie ein normales Level
        console.log("Neue Gitter-Konfiguration:", currentLevelConfig);
        initGrid(currentLevelConfig);
        updateToolbox(currentLevelConfig.blocks);

        if (typeof workspace !== 'undefined' && workspace) {
            workspace.clear();
        }

        showView('programming-view');
        reset();
    }

    // Hilfsfunktion, um Felder zu finden, die noch nicht besetzt sind
    function generateElementsBetween(count, p1, p2, existingElements) {
        let points = [];
        
        // Bereich berechnen (Bounding Box)
        // Wir fügen +1/-1 Puffer hinzu, damit Haie nicht NUR exakt auf der Linie liegen
        const minX = Math.max(0, Math.min(p1.x, p2.x) - 1);
        const maxX = Math.min(7, Math.max(p1.x, p2.x) + 1);
        const minY = Math.max(0, Math.min(p1.y, p2.y) - 1);
        const maxY = Math.min(7, Math.max(p1.y, p2.y) + 1);

        let attempts = 0;
        while (points.length < count && attempts < 100) {
            attempts++;
            let newPoint = { 
                x: Math.floor(Math.random() * (maxX - minX + 1)) + minX, 
                y: Math.floor(Math.random() * (maxY - minY + 1)) + minY 
            };
            
            // Prüfen, ob Feld belegt ist (Start, Insel oder andere Haie)
            const isOccupied = 
                (newPoint.x === p1.x && newPoint.y === p1.y) ||
                (newPoint.x === p2.x && newPoint.y === p2.y) ||
                existingElements.some(e => e.x === newPoint.x && e.y === newPoint.y) ||
                points.some(p => p.x === newPoint.x && p.y === newPoint.y);
            
            if (!isOccupied) {
                points.push(newPoint);
            }
        }
        return points;
    }

    // OVERLAY FÜR QUIZ-LEVELS
    function showOverlay(innerHtml) {
        const overlay = document.getElementById('quiz-overlay');
        const content = document.getElementById('quiz-content');
        
        content.innerHTML = innerHtml; // Nur den Inhalt der Karte füllen
        overlay.style.display = 'flex'; // Sichtbar machen
    }

    function closeOverlay() {
        document.getElementById('quiz-overlay').style.display = 'none';
    }

    function startQuiz(quizDef) {
        gameData.currentLevelNum = quizDef.id; 
        console.log("Quiz gestartet, ID gesetzt auf:", gameData.currentLevelNum);
        // State initialisieren
        currentQuizState.questions = quizDef.questions;
        currentQuizState.answers = new Array(quizDef.questions.length).fill(null);
        currentQuizState.currentIndex = 0;
        currentQuizState.levelId = quizDef.id;

        showCurrentQuestion();
    }

    function showCurrentQuestion() {
        const q = currentQuizState.questions[currentQuizState.currentIndex];
        const isLast = currentQuizState.currentIndex === currentQuizState.questions.length - 1;

        let html = `
            <div style="color: #1e293b; font-family: sans-serif;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <span style="font-size: 0.9em; color: #64748b;">Frage ${currentQuizState.currentIndex + 1} von ${currentQuizState.questions.length}</span>
                    <button onclick="closeOverlay()" style="background: none; border: none; font-size: 20px; cursor: pointer;">&times;</button>
                </div>
                
                <h3 style="margin-bottom: 20px;">${q.q}</h3>
                <div style="background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        `;

        q.a.forEach((ans, j) => {
            const type = q.multiple ? 'checkbox' : 'radio';
            // Prüfen, ob schon etwas ausgewählt wurde (falls man zurückgeht)
            const checked = isChecked(currentQuizState.currentIndex, j) ? 'checked' : '';
            
            html += `
                <label style="display: block; padding: 10px; margin: 5px 0; border: 1px solid #e2e8f0; border-radius: 5px; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">
                    <input type="${type}" name="quiz_ans" value="${j}" ${checked} style="margin-right: 10px;"> ${ans}
                </label>
            `;
        });

        html += `</div><div style="display: flex; justify-content: space-between;">`;

        // "Zurück"-Button (optional, falls sie sich umentscheiden)
        if (currentQuizState.currentIndex > 0) {
            html += `<button class="btn-gray" onclick="saveAnswer(); currentQuizState.currentIndex--; showCurrentQuestion();">Zurück</button>`;
        } else {
            html += `<span></span>`; // Platzhalter
        }

        if (isLast) {
            html += `<button class="btn-green" onclick="finishQuiz()">Quiz beenden & prüfen</button>`;
        } else {
            html += `<button class="btn-blue" onclick="saveAnswer(); currentQuizState.currentIndex++; showCurrentQuestion();">Weiter</button>`;
        }

        html += `</div></div>`;
        showOverlay(html);
    }

    // Hilfsfunktion: Speichert die aktuelle Auswahl im State
    function saveAnswer() {
        const selected = Array.from(document.querySelectorAll('input[name="quiz_ans"]:checked')).map(el => parseInt(el.value));
        currentQuizState.answers[currentQuizState.currentIndex] = selected;
    }

    function isChecked(qIdx, ansIdx) {
        const saved = currentQuizState.answers[qIdx];
        return saved && saved.includes(ansIdx);
    }

    function finishQuiz() {
        saveAnswer(); 
        
        let errors = [];
        currentQuizState.questions.forEach((q, i) => {
            const userAns = (currentQuizState.answers[i] || []).sort();
            const correctAns = [...q.correct].sort();
            
            if (JSON.stringify(userAns) !== JSON.stringify(correctAns)) {
                errors.push(i + 1); 
            }
        });

        if (errors.length === 0) {
            // --- ERFOLG ---
            let successHtml = `
                <div style="text-align: center; color: #1e293b;">
                    <div style="font-size: 50px; margin-bottom: 10px;">🏆</div>
                    <h2 style="color: #16a34a;">Großartig!</h2>
                    <p>Du hast alle Fragen richtig beantwortet und die nächste Stufe freigeschaltet.</p>
                    <button class="btn-green" style="width: 100%; margin-top: 20px;" onclick="finalizeQuizSuccess()">Weiter zur Karte</button>
                </div>
            `;
            showOverlay(successHtml);
        } else {
            // --- FEHLER ---
            let errorHtml = `
                <div style="text-align: center; color: #1e293b;">
                    <div style="font-size: 50px; margin-bottom: 10px;">🧐</div>
                    <h2 style="color: #ef4444;">Fast geschafft!</h2>
                    <p>Ein paar Dinge musst du dir noch einmal ansehen. Schau dir folgende Fragen nochmal genau an:</p>
                    <div style="background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.2em; margin: 20px 0;">
                        Frage: ${errors.join(", ")}
                    </div>
                    <p style="font-size: 0.9em; color: #64748b;">Kleiner Tipp: Lies dir die Tutorial-Texte in den Leveln nochmal durch.</p>
                    <button class="btn-gray" style="width: 100%; margin-top: 20px;" onclick="closeOverlay()">Zurück zum Menü</button>
                </div>
            `;
            showOverlay(errorHtml);
        }
    }

    // Hilfsfunktion für den echten Abschluss
    function finalizeQuizSuccess() {
        console.log("Quiz erfolgreich abgeschlossen. Verarbeite Belohnung...");
        
        // 1. Wir holen uns die ID des aktuellen Quiz aus dem globalen State
        const levelId = gameData.currentLevelNum; 
        
        // 2. Wir suchen das zugehörige Level-Objekt in deinen Spieldaten
        const currentQuizDef = gameData.levels.find(l => l.id === levelId);

        // DEBUG: Was wurde gefunden?
        console.log("Quiz ID:", levelId);
        console.log("Gefundene Definition:", currentQuizDef);

        if (!currentQuizDef) {
            console.error("Fehler: Quiz-Definition für ID " + levelId + " nicht gefunden.");
            closeOverlay();
            return;
        }

        // --- PUNKTE-LOGIK ---
        let timesCompleted = gameData.completedLevels[levelId] || 0;
        let pointsToAdd = (timesCompleted === 0) ? 15 : (timesCompleted === 1 ? 5 : 0);

        gameData.score += pointsToAdd;
        localStorage.setItem('robo_score', gameData.score);
        
        gameData.completedLevels[levelId] = timesCompleted + 1;
        localStorage.setItem('completed_levels', JSON.stringify(gameData.completedLevels));

        // --- FREISCHALT-LOGIK ---
        
        // A) Nächstes normales Level freischalten
        if (levelId >= gameData.unlockedLevel) {
            gameData.unlockedLevel = levelId + 1;
            localStorage.setItem('unlocked_level', gameData.unlockedLevel);
        }

        // B) Practice-Level freischalten (wir nutzen die ID aus der Definition)
        // Falls du in gameData.levels 'unlocksPractice: "P1"' stehen hast:
        const pId = currentQuizDef.unlocksPractice; 
        if (pId && !gameData.unlockedPractices.includes(pId)) {
            gameData.unlockedPractices.push(pId);
            localStorage.setItem('unlocked_practices', JSON.stringify(gameData.unlockedPractices));
        }

        // --- UI AKTUALISIEREN ---
        if (pointsToAdd > 0) {
            showFloatingPoints(pointsToAdd);
        }

        closeOverlay();
        
        // WICHTIG: Karte und Score sofort aktualisieren
        renderLevelPath();
        updateScoreDisplay();
    }

    const rainbowColors = ['#ff0000', '#ff9900', '#ffff00', '#33ff00', '#0099ff', '#6633ff'];

    function startSmoothTrail(duration) {
        const robotElement = document.getElementById('robot');
        const grid = document.getElementById('grid');
        if (!robotElement || !grid) return;

        // Alle 25ms einen neuen Punkt setzen für eine dichte Linie
        const interval = setInterval(() => {
            // Wir holen uns die ECHTEN Pixel-Koordinaten des Roboters während der Animation
            const rect = robotElement.getBoundingClientRect();
            const gridRect = grid.getBoundingClientRect();

            // Position relativ zum Grid berechnen
            const x = rect.left - gridRect.left;
            const y = rect.top - gridRect.top;

            // Wir rufen deine createTrail mit Pixelwerten auf
            createTrailPixels(x, y);
        }, 25);

        // Nach Ablauf der Bewegungszeit das Zeichnen stoppen
        setTimeout(() => clearInterval(interval), duration);
    }

    // Angepasste Trail-Funktion für Pixel-Werte
    function createTrailPixels(x, y) {
        const active = gameData.activeTrail;

        if (!active) return;

        if (active === 'trail_rainbow') {
            spawnRainbowLayer(x, y);
        } else if (active === 'trail_bubbles') {
            spawnBubbleLayer(x, y);
        } else if (active === 'trail_stardust') {
        spawnStardustLayer(x, y);
        } else if (active === 'trail_matrix') { 
        spawnMatrixLayer(x, y);
        } else if (active === 'trail_steps') {
        spawnStepsLayer(x, y);
        }
    }

    function spawnRainbowLayer(x, y) {
        const grid = document.getElementById('grid');
        if (!grid) return;

        // Aktuelle Richtung holen (0=Rechts, 90=Runter, 180=Links, 270=Hoch)
        let d = (robo.dir % 360 + 360) % 360;

        // Grund-Offset, um den Schweif in die Mitte des Roboters zu setzen (z.B. +20px)
        const centerX = x + 20;
        const centerY = y + 20;

        // Wir erstellen 6 Partikel gleichzeitig
        for (let i = 0; i < rainbowColors.length; i++) {
            const particle = document.createElement('div');
            particle.className = 'rainbow-trail-particle';
            particle.style.backgroundColor = rainbowColors[i];

            // Berechne den seitlichen Versatz (Offset) für diesen Farbstreifen
            // 'i' geht von 0 bis 5. Wir zentrieren den Schweif, indem wir 2.5 abziehen.
            // Das ergibt Offsets von -2.5, -1.5, -0.5, 0.5, 1.5, 2.5.
            // Multipliziert mit dem Abstand (z.B. 4px) ergibt das die Breite.
            const spread = 4; // Abstand zwischen den Farblinien
            const offset = (i - 2.5) * spread;

            let finalX = centerX;
            let finalY = centerY;

            // Versatz an die Laufrichtung anpassen
            if (d === 0 || d === 180) { 
                // Läuft horizontal -> Versatz ist vertikal (Y-Achse)
                finalY += offset;
            } else if (d === 90 || d === 270) {
                // Läuft vertikal -> Versatz ist horizontal (X-Achse)
                finalX += offset;
            }

            particle.style.left = finalX + 'px';
            particle.style.top = finalY + 'px';

            grid.appendChild(particle);

            // Animation (Schrumpfen und Verblassen)
            setTimeout(() => {
                particle.style.transform = 'scale(0.1)';
                particle.style.opacity = '0';
            }, 10);

            // Nach 500ms entfernen
            setTimeout(() => {
                particle.remove();
            }, 2000);
        }
    }

    function spawnBubbleLayer(x, y) {
        const grid = document.getElementById('grid');
        const bubble = document.createElement('img');
        
        // Pfad zu deiner SVG-Datei
        bubble.src = 'images/soap_bubble.svg'; 
        bubble.className = 'trail-bubble';

        // Zufällige Größe zwischen 8px und 20px
        const size = Math.random() * 12 + 8;
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';

        // Zufälliger Versatz (links, mittig, rechts)
        // Wir nehmen einen Bereich von ca. -15px bis +15px seitlich zur Mitte
        const sideOffset = (Math.random() - 0.5) * 30;
        
        // Richtung beachten (ähnlich wie beim Regenbogen)
        let d = (robo.dir % 360 + 360) % 360;
        let finalX = x + 20;
        let finalY = y + 20;

        if (d === 0 || d === 180) finalY += sideOffset;
        else if (d === 90 || d === 270) finalX += sideOffset;

        bubble.style.left = finalX + 'px';
        bubble.style.top = finalY + 'px';

        grid.appendChild(bubble);

        // Animation starten
        setTimeout(() => {
            // Blasen steigen leicht auf und werden unsichtbar
            bubble.style.transform = `translate(${(Math.random()-0.5)*20}px, -40px) scale(1.2)`;
            bubble.style.opacity = '0';
        }, 10);

        // Nach 1.5 Sekunden entfernen (Blasen halten meist länger als Partikel)
        setTimeout(() => bubble.remove(), 1500);
    }

    function spawnStardustLayer(x, y) {
        const grid = document.getElementById('grid');
        // Wir spawnen 2-3 kleine Sterne pro Intervall-Schritt für mehr Dichte
        for (let i = 0; i < 2; i++) {
            const star = document.createElement('div');
            star.className = 'trail-stardust-particle';
            
            // Zufällige Gold- und Silbertöne
            const colors = ['#FFF700', '#FFFFFF', '#FFD700', '#FFFACD'];
            star.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

            // Zufällige Größe (sehr klein wirkt edler)
            const size = Math.random() * 4 + 2; 
            star.style.width = size + 'px';
            star.style.height = size + 'px';

            // Position mit Zufalls-Streuung um Robis Mitte herum
            const spreadX = (Math.random() - 0.5) * 30;
            const spreadY = (Math.random() - 0.5) * 30;
            
            star.style.left = (x + 20 + spreadX) + 'px';
            star.style.top = (y + 20 + spreadY) + 'px';

            grid.appendChild(star);

            // Animation: Sanftes Absinken und Funkeln (Scale-Effekt)
            setTimeout(() => {
                const driftX = (Math.random() - 0.5) * 40; // Leichtes seitliches Wehen
                const driftY = 20 + Math.random() * 30;    // Sinken nach unten
                
                star.style.transform = `translate(${driftX}px, ${driftY}px) scale(0) rotate(180deg)`;
                star.style.opacity = '0';
            }, 20);

            setTimeout(() => star.remove(), 1000);
        }
    }

    function spawnMatrixLayer(x, y) {
        const grid = document.getElementById('grid');
        
        // Wir spawnen 2 Zeichen pro Schritt für den "Datenstrom"-Look
        for (let i = 0; i < 2; i++) {
            const bit = document.createElement('div');
            bit.className = 'trail-matrix-particle';
            
            // Zufall zwischen 0 und 1
            bit.innerText = Math.round(Math.random());

            // Zufällige Größe für Tiefe (10px bis 18px)
            const size = Math.random() * 8 + 10;
            bit.style.fontSize = size + 'px';

            // Position mit leichtem Versatz um Robi herum
            const spreadX = (Math.random() - 0.5) * 35;
            const spreadY = (Math.random() - 0.5) * 35;
            
            bit.style.left = (x + 20 + spreadX) + 'px';
            bit.style.top = (y + 20 + spreadY) + 'px';

            grid.appendChild(bit);

            // Animation: Die Zahlen "fallen" ein Stück und verblassen digital
            setTimeout(() => {
                const drop = 20 + Math.random() * 20;
                bit.style.transform = `translateY(${drop}px)`;
                bit.style.opacity = '0';
            }, 50);

            setTimeout(() => bit.remove(), 800);
        }
    }

    function spawnStepsLayer(x, y) {
        const grid = document.getElementById('grid');
        if (!grid) return;

        const foot = document.createElement('div');
        foot.className = 'trail-footprint';

        // Normalisiere Richtung auf 0, 90, 180, 270
        // 1. Normalisieren und auf den nächsten 90er runden
        let d = robo.dir;

        if (d === 360) d = 0; // 360 Grad ist wieder 0        
        
        const isLeftFoot = stepCounter % 2 === 0;
        stepCounter++;

        // --- MANUELLES RICHTUNGS-MAPPING ---
        // Wir gehen davon aus, dass dein CSS-Fuß mit dem Zeh nach OBEN zeigt.
        let rotation = 0;

        if (d === 0) {       // RECHTS
            rotation = 90;
        } else if (d === 90) { // UNTEN
            rotation = 180;
        } else if (d === 180) { // LINKS
            rotation = 270;
        } else if (d === 270) { // OBEN
            rotation = 0;
        }

        // Den "V-Winkel" für das Gehen hinzufügen
        const toeIn = isLeftFoot ? -15 : 15;
        rotation += toeIn;

        // --- POSITIONIERUNG ---
        let finalX = x + 20;
        let finalY = y + 20;
        const strideWidth = 10; 
        const sideOffset = isLeftFoot ? -strideWidth : strideWidth;

        // Seitlicher Versatz (damit die Füße nebeneinander sind)
        if (d === 0) { // Horizontal laufen -> vertikal versetzen
            finalY += sideOffset;
        } else if (d === 180) { // LINKS: Versatz umkehren!
            finalY -= sideOffset; 
        } else if (d === 90) {  // UNTEN: Versatz umkehren!
            finalX -= sideOffset;
        } else if (d === 270) { // OBEN: Normaler Versatz (X)
            finalX += sideOffset;
        }

        foot.style.left = finalX + 'px';
        foot.style.top = finalY + 'px';
        console.log(rotation);
        foot.style.transform = `rotate(${rotation}deg) scale(0.8)`;

        grid.appendChild(foot);

        // Animation & Entfernen
        setTimeout(() => { foot.style.opacity = '0'; }, 1500);
        setTimeout(() => foot.remove(), 3000);
    }

    // Hilfsfunktion zum Überprüfen, ob ein bestimmter Block zum Lösen eines Levels genutzt wurde
    function isBlockUsed(blockType) {
        if (typeof workspace === 'undefined' || !workspace) return false;
        
        // Holt alle Blöcke, die aktuell im Workspace liegen
        const allBlocks = workspace.getAllBlocks(false);
        
        // Prüft, ob mindestens einer den gesuchten Typ hat
        return allBlocks.some(block => block.type === blockType);
    }
</script>
